[tools]
go = "1.26.4"
uv = "0.11.26"
bun = "1.3.14"

[tasks.install]
run = "go mod tidy && bun install"

[tasks.codegen]
description = "Rebuild embedded web CSS and CodeMirror bundle"
run = "bun run build"

[tasks.format]
run = "go fmt ./..."

[tasks.ci]
depends = ["codegen"]
run = "go test ./... && go build -o /dev/null ./cmd/gaderno/"

[tasks.release-snapshot]
description = "Local GoReleaser snapshot (linux/darwin/windows × amd64/arm64, no publish)"
run = "goreleaser release --snapshot --clean --skip=publish"

[tasks.release-check]
description = "Validate .goreleaser.yaml"
run = "goreleaser check"
